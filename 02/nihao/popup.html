<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>话术马喽（马喽版）</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="title">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <span>话术马喽（马喽版）</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="global-toggle" checked>
        <span class="slider round"></span>
      </label>
    </div>
    
    <div class="content">
      <div id="activation-panel" class="activation-panel">
        <div class="activation-title">首次使用请激活神功</div>
        <div class="activation-desc">输入激活码后，猴目、快捷补全和 AI 功能才会解锁。</div>
        <input id="activation-code-input" class="activation-input" type="text" placeholder="请输入激活码">
        <button id="btn-activate-plugin" class="btn-secondary btn-magic" type="button">立即激活</button>
        <div id="activation-tip" class="desc small"></div>
      </div>
      
      <div class="hero-card">
        <img class="hero-art" src="assets/snow-king-hero.png" alt="马喽版主视觉">
        <div class="hero-header">
        <div class="hero-badge">Monkey Reply Console</div>
          <div class="status-indicator" id="status-text">已启用</div>
        </div>
        <div class="hero-title">话术马喽</div>
        <div class="hero-subtitle">马喽版 · 回完你的回你的</div>
        <p class="hero-desc">在输入框输入前缀（如 / 或 、）加快捷词，即可唤起补全。</p>
      </div>

  <div class="feature-group">
        <div class="feature-row">
          <div class="feature-info">
            <span class="feature-label">猴目功能</span>
            <span class="feature-sub">聊天标题旁快捷复制</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="monkey-eye-toggle">
            <span class="slider round"></span>
          </label>
        </div>
        <div class="feature-row">
          <div class="feature-info image-send-info">
            <div class="image-send-title-row">
              <span class="feature-label">图片自动确认</span>
              <button id="image-send-strategy-toggle" class="image-strategy-arrow" type="button" aria-label="切换图片发送模式" aria-expanded="false">▾</button>
            </div>
            <span class="feature-sub" id="image-send-strategy-label">自动发送</span>
            <div id="image-send-strategy-menu" class="image-strategy-menu" hidden>
              <button type="button" data-strategy="click">自动发送</button>
              <button type="button" data-strategy="enter">回车发送</button>
            </div>
          </div>
          <label class="switch">
            <input type="checkbox" id="auto-send-image-toggle">
            <span class="slider round"></span>
          </label>
        </div>
        <div class="feature-row">
          <div class="feature-info">
            <span class="feature-label">AI 回复建议</span>
            <span class="feature-sub">智能识别上下文</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="ai-reply-toggle">
            <span class="slider round"></span>
          </label>
        </div>
      </div>

      <div class="action-group">
        <button id="btn-monkey-memo" class="btn-action" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          打开猴名备忘录
        </button>
        <button id="btn-change-helper" class="btn-action" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
          异动处理
        </button>
      </div>

      <details class="debug-panel">
        <summary>开发者调试选项</summary>
        <div class="debug-content">
          <button id="btn-validate-ai" class="btn-secondary" type="button">验证识别 `div.msg-text`</button>
          <p id="ai-validate-result" class="desc small"></p>
          <button id="btn-generate-ai" class="btn-secondary" type="button">生成 AI 回复建议</button>
          <button id="btn-test-ai" class="btn-secondary" type="button">测试 AI 接口连通性</button>
          <div class="quick-click-panel">
            <div class="quick-click-head">
              <div>
                <div class="quick-click-title">快捷点击</div>
                <div class="quick-click-sub">按名称管理多个快捷键点击目标</div>
              </div>
              <button id="btn-quick-click-new" class="btn-mini" type="button">新建</button>
            </div>
            <input id="quick-click-id" type="hidden">
            <label class="debug-field">
              <span>名称</span>
              <input id="quick-click-name" type="text" placeholder="例如：点击发送按钮">
            </label>
            <label class="debug-field">
              <span>快捷键</span>
              <button id="btn-quick-click-capture" class="capture-key" type="button">点击识别按键</button>
            </label>
            <label class="debug-field">
              <span>URL 匹配</span>
              <input id="quick-click-url-pattern" type="text" placeholder="可留空，默认当前网站">
            </label>
            <div class="quick-click-target-box" id="quick-click-target-display">未选取目标</div>
            <div class="quick-click-actions">
              <button id="btn-quick-click-pick-element" class="btn-secondary" type="button">选取元素</button>
              <button id="btn-quick-click-pick-coordinate" class="btn-secondary" type="button">选取坐标</button>
              <button id="btn-quick-click-save" class="btn-secondary btn-magic" type="button">保存快捷点击</button>
              <button id="btn-quick-click-test" class="btn-secondary" type="button">测试点击</button>
            </div>
            <p id="quick-click-tip" class="desc small"></p>
            <div id="quick-click-list" class="quick-click-list"></div>
          </div>
          <div id="ai-suggest-list" class="suggest-list"></div>
          <pre id="ai-debug-log" class="debug-log"></pre>
        </div>
      </details>
    </div>

    <div class="footer">
      <button id="btn-settings" class="btn-primary">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        前往设置与话术管理
      </button>
    </div>
  </div>
  <script src="ai.minimax.js"></script>
  <script src="popup.js"></script>
</body>
</html>
